name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA...$HEAD_SHA" > diff.txt
          head -c 800000 diff.txt > diff_trimmed.txt

      - name: Ask Gemini for a review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, time
          import urllib.error
          import urllib.request

          MAX_DIFF_BYTES = 800_000

          with open("diff.txt", "rb") as f:
              original_size = len(f.read())

          with open("diff_trimmed.txt", errors="replace") as f:
              diff = f.read()

          if not diff.strip():
              open("status.txt", "w").write("clean")
              open("review.md", "w").write("No changes to review.")
              open("inline_comments.json", "w").write(json.dumps({"comments": []}))
              sys.exit(0)

          truncated_notice = ""
          if original_size > MAX_DIFF_BYTES:
              truncated_notice = (
                  f"Note: diff exceeded {MAX_DIFF_BYTES // 1000}KB and was truncated; "
                  "this review may not cover the full PR.\n\n"
              )

          prompt_text = (
              "You are a senior software engineer reviewing a pull request diff for "
              "Audience Atlas, a React/TypeScript application that visualizes global "
              "GitHub audience data on a 3D D3.js globe using Shadcn UI and Tailwind CSS.\n\n"
              "Focus strictly on:\n"
              "1. Architecture & Logic: bugs, security issues, missing error handling, "
              "race conditions, React/D3 lifecycle conflicts, hooks misuse, state management.\n"
              "2. UI & Responsiveness: Tailwind misuse, Shadcn UI misuse, responsive issues.\n"
              "3. UX & Information Density: enforce \"less is more\" for the audience data views.\n"
              "4. Maintainability: structural problems, component organization, naming clarity.\n"
              "5. Syntax & Type Safety: TypeScript errors, missing types, unhandled promises.\n\n"
              "Include every finding you have, however small. Do not filter for brevity.\n"
              "For an issue tied to one exact line, put it on its own single line formatted "
              "as: **[FILE:LINE]** - description. Use the NEW file's line numbers (the "
              "right-hand side of the diff — added or unchanged context lines), never the "
              "old file's numbers.\n"
              "For architectural or cross-cutting issues that don't belong to one line, "
              "describe them in their own section instead of forcing a line number.\n"
              "No emojis. Be direct and concise.\n\n"
              "If there is truly nothing significant, respond with exactly: "
              "\"No significant issues found.\"\n\n"
              + truncated_notice +
              "DIFF:\n" + diff
          )

          payload = {
              "contents": [{"parts": [{"text": prompt_text}]}],
              "generationConfig": {
                  "temperature": 0.2,
                  "maxOutputTokens": 8192,
              },
          }

          req = urllib.request.Request(
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent",
              data=json.dumps(payload).encode(),
              headers={
                  "Content-Type": "application/json",
                  "x-goog-api-key": os.environ["GEMINI_API_KEY"],
              },
          )

          def call_with_retries(request, max_attempts=3, base_delay=2):
              last_err = None
              for attempt in range(1, max_attempts + 1):
                  try:
                      with urllib.request.urlopen(request, timeout=60) as resp:
                          return json.loads(resp.read())
                  except urllib.error.HTTPError as e:
                      last_err = e
                      if e.code in (429, 500, 502, 503, 504) and attempt < max_attempts:
                          time.sleep(base_delay * attempt)
                          continue
                      raise
                  except urllib.error.URLError as e:
                      last_err = e
                      if attempt < max_attempts:
                          time.sleep(base_delay * attempt)
                          continue
                      raise
              raise last_err

          def fail(message):
              open("status.txt", "w").write("error")
              open("review.md", "w").write(f"AI review skipped: {message}")
              open("inline_comments.json", "w").write(json.dumps({"comments": []}))

          try:
              result = call_with_retries(req)
              candidates = result.get("candidates") or []
              if not candidates:
                  reason = result.get("promptFeedback", {}).get("blockReason", "unknown")
                  raise ValueError(f"no candidates returned (blockReason={reason})")

              parts = candidates[0].get("content", {}).get("parts", [])
              text = (parts[0].get("text", "") if parts else "").strip()
              if not text:
                  raise ValueError("empty response text")

              comments = []
              for path, line, cbody in re.findall(
                  r'\*\*\[([^:\]\n]+):(\d+)\]\*\*\s*-\s*([^\n]+)', text
              ):
                  comments.append({"path": path.strip(), "line": int(line), "body": cbody.strip()})

              status = "clean" if text.startswith("No significant issues found") else "issues"

              open("status.txt", "w").write(status)
              open("review.md", "w").write(text)
              open("inline_comments.json", "w").write(json.dumps({"comments": comments}))

          except urllib.error.HTTPError as e:
              detail = e.read().decode(errors="replace")[:300]
              print(f"::warning::Gemini HTTP {e.code}: {detail}", file=sys.stderr)
              fail(f"Gemini API returned HTTP {e.code}. See the Actions log for details.")

          except (urllib.error.URLError, KeyError, IndexError, ValueError, json.JSONDecodeError) as e:
              print(f"::warning::Gemini call failed: {e}", file=sys.stderr)
              fail(f"unexpected error contacting/parsing Gemini response ({e}).")
          PYEOF

      - name: Submit review
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const status = fs.readFileSync('status.txt', 'utf8').trim();
            const summary = fs.readFileSync('review.md', 'utf8');

            let comments = [];
            try {
              comments = JSON.parse(fs.readFileSync('inline_comments.json', 'utf8')).comments || [];
            } catch (e) {
              comments = [];
            }

            if (comments.length > 0) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              });
              const changedPaths = new Set(files.map(f => f.filename));
              comments = comments
                .filter(c => changedPaths.has(c.path))
                .map(c => ({ path: c.path, line: c.line, side: 'RIGHT', body: c.body }));
            }

            const event = status === 'issues' ? 'REQUEST_CHANGES' : 'COMMENT';
            const base = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event,
            };

            try {
              await github.rest.pulls.createReview({ ...base, body: summary, comments });
            } catch (e) {
              core.warning(`Review with inline comments failed (${e.message}); retrying without them.`);
              await github.rest.pulls.createReview({
                ...base,
                body: summary + '\n\n_Some inline comments could not be attached and are omitted._',
              });
            }
