name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git diff "origin/$BASE_REF...origin/$HEAD_REF" > diff.txt
          head -c 200000 diff.txt > diff_trimmed.txt

      - name: Ask Gemini for a review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          with open("diff_trimmed.txt", errors="replace") as f:
              diff = f.read()

          prompt_text = """You are a senior software engineer reviewing a pull request diff for Audience Atlas, a React/TypeScript application that visualizes global GitHub audience data on a 3D D3.js globe using Shadcn UI and Tailwind CSS.

          Focus your review strictly on the following areas:
          1. Architecture & Logic: Catch bugs, security issues, missing error handling, and race conditions. Check for React/D3 lifecycle conflicts.
          2. UI & Responsiveness: Verify Tailwind classes and flag Shadcn UI misuses.
          3. UX & Information Density: Enforce a "less is more" approach for the GitHub audience data.
          4. Maintainability: Identify structural problems. Ignore minor stylistic nits.

          Comment Formatting Rules:
          - ZERO emojis.
          - Keep comments extremely brief, direct, and pragmatic.
          - Use markdown bullet points.
          - If nothing significant is wrong, output exactly: "No significant issues found."

          DIFF:
          """ + diff

          body = json.dumps({"contents":[{"parts":[{"text": prompt_text}]}]}).encode()
          req = urllib.request.Request(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent",
            data=body,
            headers={ 
              "Content-Type": "application/json",
              "x-goog-api-key": os.environ['GEMINI_API_KEY']
            }
          )
          resp = json.loads(urllib.request.urlopen(req).read())
          text = resp["candidates"][0]["content"]["parts"][0]["text"]
          open("review.md", "w").write(text)
          PYEOF

      - name: Submit Formal PR Review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');

            let reviewEvent = 'REQUEST_CHANGES';
            if (body.includes('No significant issues found.')) {
              reviewEvent = 'COMMENT';
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body,
              event: reviewEvent
            });
