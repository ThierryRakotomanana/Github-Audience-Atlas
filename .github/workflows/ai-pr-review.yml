name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git diff "origin/$BASE_REF...origin/$HEAD_REF" > diff.txt
          # Guard against huge diffs blowing the free-tier context/rate limit
          head -c 20000 diff.txt > diff_trimmed.txt

      - name: Ask Gemini for a review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          with open("diff_trimmed.txt", errors="replace") as f:
              diff = f.read()

          prompt = f"""You are a senior software engineer reviewing a pull request diff.
          Focus only on: bugs, security issues, race conditions, missing error handling,
          and clear maintainability problems. Ignore style nits a linter would catch.
          If nothing significant is wrong, say so briefly. Use markdown bullet points.

          DIFF:
          {diff}
          """
          body = json.dumps({"contents":[{"parts":[{"text": prompt}]}]}).encode()
          req = urllib.request.Request(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent",
            data=body,
            headers={ 
              "Content-Type": "application/json",
              "x-goog-api-key": os.environ['GEMINI_API_KEY']
            }
          )
          resp = json.loads(urllib.request.urlopen(req).read())
          text = resp["candidates"][0]["content"]["parts"][0]["text"]
          open("review.md", "w").write(text)
          PYEOF

      - name: Submit Formal PR Review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');

            let reviewEvent = 'COMMENT';
            if (body.includes('No significant issues found.')) {
              reviewEvent = 'APPROVE';
            } else {
              reviewEvent = 'REQUEST_CHANGES'; 
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body,
              event: reviewEvent
            });
