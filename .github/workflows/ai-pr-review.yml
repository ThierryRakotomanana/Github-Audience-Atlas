name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > diff.txt
          # Guard against huge diffs blowing the free-tier context/rate limit
          head -c 20000 diff.txt > diff_trimmed.txt

      - name: Ask Gemini for a review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request

          diff = open("diff_trimmed.txt").read()
          prompt = f"""You are a senior software engineer reviewing a pull request diff.
          Focus only on: bugs, security issues, race conditions, missing error handling,
          and clear maintainability problems. Ignore style nits a linter would catch.
          If nothing significant is wrong, say so briefly. Use markdown bullet points.

          DIFF:
          {diff}
          """
          body = json.dumps({"contents":[{"parts":[{"text": prompt}]}]}).encode()
          req = urllib.request.Request(
            f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={os.environ['GEMINI_API_KEY']}",
            data=body, headers={"Content-Type": "application/json"}
          )
          resp = json.loads(urllib.request.urlopen(req).read())
          text = resp["candidates"][0]["content"]["parts"][0]["text"]
          open("review.md", "w").write(text)
          PYEOF

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Review (advisory, not a blocker)\n\n${body}`
            });
