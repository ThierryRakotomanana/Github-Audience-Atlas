name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "$BASE_SHA...$HEAD_SHA" > diff.txt
          wc -c < diff.txt > diff_size.txt
          head -c 800000 diff.txt > diff_trimmed.txt

      - name: Ask Gemini for full review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, time
          import urllib.error
          import urllib.request

          MAX_DIFF_BYTES = 800_000

          with open("diff_trimmed.txt", errors="replace") as f:
              diff = f.read()

          with open("diff_size.txt") as f:
              original_size = int(f.read().strip())

          truncated_notice = ""
          if original_size > MAX_DIFF_BYTES:
              truncated_notice = (
                  f"\n⚠️ **Note:** Diff exceeded {MAX_DIFF_BYTES // 1000}KB and was truncated. "
                  f"This review may not cover the full PR.\n"
              )

          if not diff.strip():
              open("review.md", "w").write("No changes to review.")
              open("inline_comments.json", "w").write(json.dumps({"comments": []}))
              sys.exit(0)

          prompt_text = f"""You are a senior software engineer reviewing a pull request diff for Audience Atlas, a React/TypeScript application that visualizes global GitHub audience data on a 3D D3.js globe using Shadcn UI and Tailwind CSS.

          Focus strictly on:
          1. Architecture & Logic: bugs, security issues, missing error handling, race conditions, React/D3 lifecycle conflicts, hooks misuse, state management patterns
          2. UI & Responsiveness: Tailwind misuse, Shadcn UI misuse, responsive design issues
          3. UX & Information Density: enforce "less is more" for audience data views
          4. Maintainability: structural problems, component organization, naming clarity
          5. Syntax & Type Safety: TypeScript errors, missing types, Promise handling

          Include ALL findings. Be specific and direct. Use markdown.
          For issues tied to specific lines, format as: **[FILE:LINE]** - Issue description
          For architectural/pattern issues that don't anchor to one line, describe them separately.
          Zero emojis. Brief, pragmatic.

          If nothing significant is wrong, start with: "✅ No significant issues found."
          {truncated_notice}

          DIFF:
          {diff}"""

          body = json.dumps({{"contents": [{{"parts": [{{"text": prompt_text}}]}}]}}).encode()
          req = urllib.request.Request(
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent",
              data=body,
              headers={{
                  "Content-Type": "application/json",
                  "x-goog-api-key": os.environ["GEMINI_API_KEY"],
              }},
          )

          def call_with_retries(request, max_attempts=3, base_delay=2):
              last_err = None
              for attempt in range(1, max_attempts + 1):
                  try:
                      with urllib.request.urlopen(request, timeout=60) as resp:
                          return json.loads(resp.read())
                  except urllib.error.HTTPError as e:
                      last_err = e
                      if e.code in (429, 500, 502, 503, 504) and attempt < max_attempts:
                          time.sleep(base_delay * attempt)
                          continue
                      raise
                  except urllib.error.URLError as e:
                      last_err = e
                      if attempt < max_attempts:
                          time.sleep(base_delay * attempt)
                          continue
                      raise
              raise last_err

          try:
              payload = call_with_retries(req)

              candidates = payload.get("candidates") or []
              if not candidates:
                  reason = payload.get("promptFeedback", {{}}).get("blockReason", "unknown")
                  raise ValueError(f"no candidates returned (blockReason={reason})")
              if "content" not in candidates[0] or "parts" not in candidates[0]["content"]:
                  raise ValueError("response missing content/parts")

              full_text = candidates[0]["content"]["parts"][0].get("text", "").strip()
              if not full_text:
                  raise ValueError("empty response from Gemini")

              # Extract line-anchored findings for inline comments
              # Pattern: **[FILE:LINE]** - description
              inline_comments = []
              pattern = r'\*\*\[([^:\]]+):(\d+)\]\*\*\s*-\s*([^\n]+)'
              for match in re.finditer(pattern, full_text):
                  path, line_str, comment = match.groups()
                  inline_comments.append({{
                      "path": path.strip(),
                      "line": int(line_str),
                      "body": comment.strip()
                  }})

              open("review.md", "w").write(full_text)
              open("inline_comments.json", "w").write(json.dumps({{"comments": inline_comments}}))

          except urllib.error.HTTPError as e:
              detail = e.read().decode(errors="replace")[:500]
              print(f"::warning::Gemini API HTTP {e.code}: {detail}", file=sys.stderr)
              fallback = f"⚠️ AI review skipped: Gemini API returned HTTP {e.code}. Check the Actions log for details."
              open("review.md", "w").write(fallback)
              open("inline_comments.json", "w").write(json.dumps({{"comments": []}}))

          except (urllib.error.URLError, KeyError, IndexError, ValueError, json.JSONDecodeError) as e:
              print(f"::warning::Gemini API error: {e}", file=sys.stderr)
              fallback = f"⚠️ AI review skipped: unexpected error ({e}). Please review manually."
              open("review.md", "w").write(fallback)
              open("inline_comments.json", "w").write(json.dumps({{"comments": []}}))
          PYEOF

      - name: Post inline comments (if any)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let inlineData = { comments: [] };
            try {
              inlineData = JSON.parse(fs.readFileSync('inline_comments.json', 'utf8'));
            } catch (e) {
              console.log('No inline comments to post');
            }

            const prFiles = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100  
            });

            const changedFiles = new Map();
            prFiles.data.forEach(file => {
              changedFiles.set(file.filename, file);
            });

            let postedCount = 0;
            for (const comment of inlineData.comments) {
              if (changedFiles.has(comment.path)) {
                try {
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    body: comment.body,
                    commit_id: context.payload.pull_request.head.sha,
                    path: comment.path,
                    line: comment.line,
                    side: 'RIGHT'
                  });
                  postedCount++;
                } catch (error) {
                  console.log(`Skipped inline comment on ${comment.path}:${comment.line} - ${error.message}`);
                }
              }
            }

            console.log(`Posted ${postedCount} inline comments`);
            core.setOutput('inline_comment_count', postedCount);

      - name: Post review summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('review.md', 'utf8');
            const inlineCount = ${{ steps['Post inline comments (if any)'].outputs.inline_comment_count || '0' }};

            let reviewEvent = 'COMMENT';
            let reviewBody = summary;

            if (summary.includes('✅ No significant issues found.')) {
              reviewEvent = 'COMMENT';
              reviewBody = `✅ **AI Review**: No significant issues found.`;
            } else if (summary.length > 100 && !summary.includes('skipped')) {
              reviewEvent = 'REQUEST_CHANGES';
              reviewBody = `⚠️ **AI Review**: Findings require attention. See details and inline comments below.\n\n${summary}`;
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: reviewBody,
                event: reviewEvent
              });
              console.log(`Review submitted as ${reviewEvent}`);
            } catch (error) {
              console.log(`Warning: Could not submit review - ${error.message}`);
            }
